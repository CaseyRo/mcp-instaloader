services:
  mcp-instaloader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-instaloader
    ports:
      - "${MCP_PORT:-3336}:${MCP_PORT:-3336}"
    environment:
      MCP_PORT: ${MCP_PORT:-3336}
      COOKIE_FILE: ${COOKIE_FILE:-}
      MCP_API_KEY: ${MCP_API_KEY:-}
      TRANSPORT: http
      HOST: 0.0.0.0
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-10}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-60}
    volumes:
      - instaloader_sessions:/home/appuser/.config/instaloader
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${MCP_PORT:-3336}/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  instaloader_sessions:
