services:
  mcp-instaloader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-instaloader
    ports:
      - "${MCP_PORT:-3336}:${MCP_PORT:-3336}"
    environment:
      MCP_PORT: ${MCP_PORT:-3336}
      COOKIE_FILE: ${COOKIE_FILE:-}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-mcp-instaloader}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
    volumes:
      - instaloader_sessions:/home/appuser/.config/instaloader
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${MCP_PORT:-3336}/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  instaloader_sessions:
